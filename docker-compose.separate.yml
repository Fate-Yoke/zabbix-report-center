version: '3.8'

# 前后端分开部署配置
# 使用方式：docker-compose -f docker-compose.separate.yml up -d

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: zabbix-report-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-zabbix123456}
      MYSQL_DATABASE: zabbix_report_center
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    # 后端容器内访问，不对外暴露
    # ports:
    #   - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: zabbix-report-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # 数据库配置
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-zabbix123456}@mysql:3306/zabbix_report_center
      # JWT 密钥（生产环境请修改）
      SECRET_KEY: ${SECRET_KEY:-zabbix-report-center-secret-key-2024-please-change}
      # 加密密钥（生产环境请修改，必须是32字节）
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-zabbix-encryption-key-32bytes!}
      # 调试模式
      DEBUG: ${DEBUG:-false}
      TZ: Asia/Shanghai
    volumes:
      # 持久化导出文件
      - exports_data:/app/exports
    # 只在容器网络内暴露，不对外
    expose:
      - "38204"

  # 前端服务（Nginx）
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: zabbix-report-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "37201:37201"

volumes:
  mysql_data:
  exports_data:
