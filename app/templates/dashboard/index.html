{% extends "base.html" %}

{% block title %}首页 - Zabbix Report Center{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-speedometer2"></i> 系统概览</h2>
    <div class="d-flex align-items-center gap-3">
        <small class="text-muted" id="last-update-time">-</small>
        <select class="form-select form-select-sm" id="cache-time-select" style="width: auto;" onchange="updateCacheTime()">
            <option value="60">缓存1分钟</option>
            <option value="180">缓存3分钟</option>
            <option value="300" selected>缓存5分钟</option>
            <option value="600">缓存10分钟</option>
            <option value="0">不使用缓存</option>
        </select>
        <button class="btn btn-primary" onclick="refreshDashboard()" id="refresh-btn">
            <i class="bi bi-arrow-clockwise"></i> 刷新
        </button>
    </div>
</div>

<!-- 加载提示 -->
<div id="loading-tip" class="alert alert-info d-none">
    <div class="d-flex align-items-center">
        <div class="spinner-border spinner-border-sm me-2" role="status">
            <span class="visually-hidden">加载中...</span>
        </div>
        <span>正在加载数据...</span>
    </div>
</div>

<!-- 统计卡片 -->
<div class="row mb-4" id="stats-cards">
    <div class="col-md-4">
        <div class="card status-card bg-primary text-white">
            <div class="card-body text-center">
                <i class="bi bi-hdd-stack" style="font-size: 2rem;"></i>
                <h3 class="mt-2 mb-0" id="total-count">-</h3>
                <p class="mb-0">设备总量</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card status-card bg-success text-white">
            <div class="card-body text-center">
                <i class="bi bi-check-circle" style="font-size: 2rem;"></i>
                <h3 class="mt-2 mb-0" id="online-count">-</h3>
                <p class="mb-0">在线设备</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card status-card bg-danger text-white">
            <div class="card-body text-center">
                <i class="bi bi-x-circle" style="font-size: 2rem;"></i>
                <h3 class="mt-2 mb-0" id="offline-count">-</h3>
                <p class="mb-0">离线设备</p>
            </div>
        </div>
    </div>
</div>

<!-- 提示信息 -->
<div id="no-config-tip" class="alert alert-warning">
    <i class="bi bi-info-circle"></i> 请在左上角选择具体的 Zabbix 配置以查看监控数据
</div>

<!-- 离线设备列表 -->
<div class="card mb-4 d-none" id="offline-card">
    <div class="card-header bg-danger text-white">
        <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> 离线设备列表</h5>
    </div>
    <div class="card-body">
        <div id="offline-placeholder" class="text-center text-muted py-4 d-none">
            暂无离线设备
        </div>
        <div id="offline-table-wrapper">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th style="width: 60px;">序号</th>
                        <th>设备名</th>
                        <th>IP地址</th>
                        <th>所属群组</th>
                    </tr>
                </thead>
                <tbody id="offline-table">
                </tbody>
            </table>
        </div>
        <!-- 加载更多按钮 -->
        <div class="text-center mt-3" id="offline-load-more-container" style="display: none;">
            <button class="btn btn-outline-danger" onclick="loadMoreOfflineHosts()">
                <i class="bi bi-arrow-down-circle"></i> 加载更多
            </button>
        </div>
    </div>
</div>

<!-- 在线设备列表 -->
<div class="card d-none" id="online-card">
    <div class="card-header bg-success text-white">
        <h5 class="mb-0"><i class="bi bi-check-circle-fill"></i> 在线设备列表</h5>
    </div>
    <div class="card-body">
        <div id="online-placeholder" class="text-center text-muted py-4 d-none">
            暂无在线设备
        </div>
        <div id="online-table-wrapper">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th style="width: 60px;">序号</th>
                        <th>设备名</th>
                        <th>IP地址</th>
                        <th>所属群组</th>
                    </tr>
                </thead>
                <tbody id="online-table">
                </tbody>
            </table>
        </div>
        <!-- 加载更多按钮 -->
        <div class="text-center mt-3" id="online-load-more-container" style="display: none;">
            <button class="btn btn-outline-success" onclick="loadMoreOnlineHosts()">
                <i class="bi bi-arrow-down-circle"></i> 加载更多
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentConfigId = null;
    let autoRefreshTimer = null;  // 自动刷新定时器
    let cacheTimeSeconds = 300;  // 默认缓存5分钟

    // 分页相关变量
    let allOfflineHosts = [];
    let allOnlineHosts = [];
    let offlineDisplayCount = 20;
    let onlineDisplayCount = 20;
    const PAGE_SIZE = 20;

    // 更新缓存时间
    function updateCacheTime() {
        const select = document.getElementById('cache-time-select');
        cacheTimeSeconds = parseInt(select.value);

        // 重新启动自动刷新定时器
        startAutoRefresh();

        // 如果选择不使用缓存，立即刷新
        if (cacheTimeSeconds === 0) {
            const configId = getSelectedZabbixConfigId();
            if (configId) {
                loadDashboard(configId, true);
            }
        }
    }

    // 加载仪表盘数据
    async function loadDashboard(configId, forceRefresh = false) {
        if (!configId) {
            document.getElementById('no-config-tip').classList.remove('d-none');
            document.getElementById('loading-tip').classList.add('d-none');
            document.getElementById('offline-card').classList.add('d-none');
            document.getElementById('online-card').classList.add('d-none');
            // 重置统计数据
            document.getElementById('total-count').textContent = '-';
            document.getElementById('online-count').textContent = '-';
            document.getElementById('offline-count').textContent = '-';
            return;
        }

        currentConfigId = configId;
        document.getElementById('no-config-tip').classList.add('d-none');
        document.getElementById('loading-tip').classList.remove('d-none');
        document.getElementById('offline-card').classList.add('d-none');
        document.getElementById('online-card').classList.add('d-none');

        // 禁用刷新按钮
        const refreshBtn = document.getElementById('refresh-btn');
        refreshBtn.disabled = true;

        try {
            const url = `/api/monitor/dashboard?zabbix_config_id=${configId}&force_refresh=${forceRefresh}&cache_time=${cacheTimeSeconds}`;
            const response = await fetch(url);

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || '加载失败');
            }

            const data = await response.json();

            // 更新最后更新时间
            updateLastUpdateTime(data.cached_at, data.cached);

            // 隐藏加载提示
            document.getElementById('loading-tip').classList.add('d-none');

            // 更新统计卡片
            document.getElementById('total-count').textContent = data.total;
            document.getElementById('online-count').textContent = data.online_count;
            document.getElementById('offline-count').textContent = data.offline_count;

            // 保存完整数据
            allOfflineHosts = data.offline_hosts || [];
            allOnlineHosts = data.online_hosts || [];

            // 重置显示计数
            offlineDisplayCount = PAGE_SIZE;
            onlineDisplayCount = PAGE_SIZE;

            // 渲染离线设备
            renderOfflineHosts();

            // 渲染在线设备
            renderOnlineHosts();

        } catch (error) {
            console.error('加载数据失败:', error);
            document.getElementById('loading-tip').classList.add('d-none');
            document.getElementById('no-config-tip').classList.remove('d-none');
            document.getElementById('no-config-tip').className = 'alert alert-danger';
            document.getElementById('no-config-tip').innerHTML = '<i class="bi bi-exclamation-triangle"></i> 加载数据失败: ' + error.message;
        } finally {
            // 恢复刷新按钮
            refreshBtn.disabled = false;
        }
    }

    // 渲染离线设备列表
    function renderOfflineHosts() {
        const offlineCard = document.getElementById('offline-card');
        const offlinePlaceholder = document.getElementById('offline-placeholder');
        const offlineTable = document.getElementById('offline-table');
        const offlineWrapper = document.getElementById('offline-table-wrapper');
        const loadMoreContainer = document.getElementById('offline-load-more-container');

        offlineCard.classList.remove('d-none');

        if (allOfflineHosts.length === 0) {
            offlinePlaceholder.classList.remove('d-none');
            offlineWrapper.classList.add('d-none');
            loadMoreContainer.style.display = 'none';
            return;
        }

        offlinePlaceholder.classList.add('d-none');
        offlineWrapper.classList.remove('d-none');

        // 只显示前 offlineDisplayCount 条
        const hostsToShow = allOfflineHosts.slice(0, offlineDisplayCount);
        offlineTable.innerHTML = hostsToShow.map((host, index) => `
            <tr class="table-danger">
                <td class="text-center">${index + 1}</td>
                <td>${host.name}</td>
                <td>${host.ip}</td>
                <td>${host.groups}</td>
            </tr>
        `).join('');

        // 显示或隐藏"加载更多"按钮
        if (offlineDisplayCount < allOfflineHosts.length) {
            loadMoreContainer.style.display = 'block';
        } else {
            loadMoreContainer.style.display = 'none';
        }
    }

    // 渲染在线设备列表
    function renderOnlineHosts() {
        const onlineCard = document.getElementById('online-card');
        const onlinePlaceholder = document.getElementById('online-placeholder');
        const onlineTable = document.getElementById('online-table');
        const onlineWrapper = document.getElementById('online-table-wrapper');
        const loadMoreContainer = document.getElementById('online-load-more-container');

        onlineCard.classList.remove('d-none');

        if (allOnlineHosts.length === 0) {
            onlinePlaceholder.classList.remove('d-none');
            onlineWrapper.classList.add('d-none');
            loadMoreContainer.style.display = 'none';
            return;
        }

        onlinePlaceholder.classList.add('d-none');
        onlineWrapper.classList.remove('d-none');

        // 只显示前 onlineDisplayCount 条
        const hostsToShow = allOnlineHosts.slice(0, onlineDisplayCount);
        onlineTable.innerHTML = hostsToShow.map((host, index) => `
            <tr>
                <td class="text-center">${index + 1}</td>
                <td>${host.name}</td>
                <td>${host.ip}</td>
                <td>${host.groups}</td>
            </tr>
        `).join('');

        // 显示或隐藏"加载更多"按钮
        if (onlineDisplayCount < allOnlineHosts.length) {
            loadMoreContainer.style.display = 'block';
        } else {
            loadMoreContainer.style.display = 'none';
        }
    }

    // 加载更多离线设备
    function loadMoreOfflineHosts() {
        offlineDisplayCount += PAGE_SIZE;
        renderOfflineHosts();
    }

    // 加载更多在线设备
    function loadMoreOnlineHosts() {
        onlineDisplayCount += PAGE_SIZE;
        renderOnlineHosts();
    }

    // 更新最后更新时间显示
    function updateLastUpdateTime(cachedAt, isCached) {
        const timeElement = document.getElementById('last-update-time');
        if (!cachedAt) {
            timeElement.textContent = '-';
            return;
        }

        const updateTime = new Date(cachedAt);
        const now = new Date();
        const diffSeconds = Math.floor((now - updateTime) / 1000);

        let timeText = '';
        if (diffSeconds < 60) {
            timeText = '刚刚更新';
        } else if (diffSeconds < 3600) {
            const minutes = Math.floor(diffSeconds / 60);
            timeText = `${minutes}分钟前更新`;
        } else {
            const hours = Math.floor(diffSeconds / 3600);
            timeText = `${hours}小时前更新`;
        }

        timeElement.textContent = timeText + (isCached ? ' (缓存)' : '');
    }

    // 启动自动刷新定时器
    function startAutoRefresh() {
        // 清除旧的定时器
        if (autoRefreshTimer) {
            clearInterval(autoRefreshTimer);
        }

        // 如果选择不使用缓存，不启动自动刷新
        if (cacheTimeSeconds === 0) {
            return;
        }

        // 根据选择的缓存时间自动刷新
        autoRefreshTimer = setInterval(() => {
            const configId = getSelectedZabbixConfigId();
            if (configId) {
                console.log('自动刷新数据...');
                loadDashboard(configId, false);  // 不强制刷新，使用缓存
            }
        }, cacheTimeSeconds * 1000);
    }

    // 停止自动刷新
    function stopAutoRefresh() {
        if (autoRefreshTimer) {
            clearInterval(autoRefreshTimer);
            autoRefreshTimer = null;
        }
    }

    // 手动刷新（强制刷新）
    function refreshDashboard() {
        const configId = getSelectedZabbixConfigId();
        if (configId) {
            loadDashboard(configId, true);  // 强制刷新
        }
    }

    // 监听全局配置加载完成事件
    window.addEventListener('zabbixConfigLoaded', function() {
        const configId = getSelectedZabbixConfigId();
        if (configId) {
            loadDashboard(configId);
            startAutoRefresh();  // 启动自动刷新
        }
    });

    // 监听全局配置变化事件
    window.addEventListener('zabbixConfigChanged', function(e) {
        loadDashboard(e.detail.configId);
        startAutoRefresh();  // 重新启动自动刷新
    });

    // 页面加载时，如果配置已加载则直接加载数据
    document.addEventListener('DOMContentLoaded', function() {
        // 等待一下确保全局配置已加载
        setTimeout(function() {
            const configId = getSelectedZabbixConfigId();
            if (configId) {
                loadDashboard(configId);
                startAutoRefresh();  // 启动自动刷新
            }
        }, 500);
    });

    // 页面卸载时停止自动刷新
    window.addEventListener('beforeunload', function() {
        stopAutoRefresh();
    });
</script>
{% endblock %}
