{% extends "base.html" %}

{% block title %}系统设置 - Zabbix Report Center{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-gear-fill"></i> 系统设置</h2>
</div>

<!-- 注册设置 -->
<div class="card mb-4">
    <div class="card-header">
        <h5 class="mb-0"><i class="bi bi-person-plus"></i> 注册设置</h5>
    </div>
    <div class="card-body">
        <!-- 注册开关 -->
        <div class="row align-items-center mb-4 pb-3 border-bottom">
            <div class="col-md-8">
                <h6>用户注册</h6>
                <p class="text-muted mb-0">控制是否允许新用户注册账号。关闭后，只有管理员可以添加新用户。</p>
            </div>
            <div class="col-md-4 text-end">
                <div class="form-check form-switch d-inline-block">
                    <input class="form-check-input" type="checkbox" id="allow-registration" style="width: 3rem; height: 1.5rem;">
                    <label class="form-check-label" for="allow-registration" id="registration-label">开启</label>
                </div>
            </div>
        </div>

        <!-- 注册后需管理员启用 -->
        <div class="row align-items-center">
            <div class="col-md-8">
                <h6>注册后需管理员启用</h6>
                <p class="text-muted mb-0">开启后，新注册的用户默认处于禁用状态，需要管理员手动启用后才能登录。</p>
            </div>
            <div class="col-md-4 text-end">
                <div class="form-check form-switch d-inline-block">
                    <input class="form-check-input" type="checkbox" id="require-activation" style="width: 3rem; height: 1.5rem;">
                    <label class="form-check-label" for="require-activation" id="activation-label">关闭</label>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 提示消息 -->
<div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="toast" class="toast" role="alert">
        <div class="toast-header">
            <strong class="me-auto" id="toast-title">提示</strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
        </div>
        <div class="toast-body" id="toast-body"></div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
    // 显示提示消息
    function showToast(title, message, type = 'info') {
        const toast = document.getElementById('toast');
        const toastTitle = document.getElementById('toast-title');
        const toastBody = document.getElementById('toast-body');

        toast.className = 'toast';
        if (type === 'success') {
            toast.classList.add('text-bg-success');
        } else if (type === 'error') {
            toast.classList.add('text-bg-danger');
        }

        toastTitle.textContent = title;
        toastBody.textContent = message;
        new bootstrap.Toast(toast).show();
    }

    // 加载注册状态
    async function loadRegistrationStatus() {
        try {
            const response = await fetch('/api/system/registration');
            const data = await response.json();

            const regToggle = document.getElementById('allow-registration');
            const regLabel = document.getElementById('registration-label');
            const actToggle = document.getElementById('require-activation');
            const actLabel = document.getElementById('activation-label');

            regToggle.checked = data.allowed;
            regLabel.textContent = data.allowed ? '开启' : '关闭';

            actToggle.checked = data.require_activation;
            actLabel.textContent = data.require_activation ? '开启' : '关闭';
        } catch (error) {
            console.error('加载注册状态失败:', error);
        }
    }

    // 切换注册状态
    document.getElementById('allow-registration').addEventListener('change', async function() {
        const allowed = this.checked;
        const label = document.getElementById('registration-label');

        try {
            const response = await fetch('/api/system/registration', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ allowed: allowed })
            });

            if (response.ok) {
                label.textContent = allowed ? '开启' : '关闭';
                showToast('成功', `注册功能已${allowed ? '开启' : '关闭'}`, 'success');
            } else {
                const result = await response.json();
                showToast('错误', result.detail || '操作失败', 'error');
                this.checked = !allowed;
                label.textContent = !allowed ? '开启' : '关闭';
            }
        } catch (error) {
            showToast('错误', '操作失败: ' + error.message, 'error');
            this.checked = !allowed;
            label.textContent = !allowed ? '开启' : '关闭';
        }
    });

    // 切换注册后需管理员启用
    document.getElementById('require-activation').addEventListener('change', async function() {
        const requireActivation = this.checked;
        const label = document.getElementById('activation-label');

        try {
            const response = await fetch('/api/system/activation', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ require_activation: requireActivation })
            });

            if (response.ok) {
                label.textContent = requireActivation ? '开启' : '关闭';
                showToast('成功', `注册后${requireActivation ? '需要' : '不需要'}管理员启用账户`, 'success');
            } else {
                const result = await response.json();
                showToast('错误', result.detail || '操作失败', 'error');
                this.checked = !requireActivation;
                label.textContent = !requireActivation ? '开启' : '关闭';
            }
        } catch (error) {
            showToast('错误', '操作失败: ' + error.message, 'error');
            this.checked = !requireActivation;
            label.textContent = !requireActivation ? '开启' : '关闭';
        }
    });

    // 初始化
    loadRegistrationStatus();
</script>
{% endblock %}
