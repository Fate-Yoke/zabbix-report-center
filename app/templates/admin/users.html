{% extends "base.html" %}

{% block title %}用户管理 - Zabbix Report Center{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-people"></i> 用户管理</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#userModal" onclick="openCreateModal()">
        <i class="bi bi-plus-circle"></i> 添加用户
    </button>
</div>

<!-- 用户列表 -->
<div class="card">
    <div class="card-body">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>用户名</th>
                    <th>邮箱</th>
                    <th>角色</th>
                    <th>Zabbix权限</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="user-table">
                <tr><td colspan="7" class="text-center text-muted">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 用户编辑模态框 -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="userModalTitle">添加用户</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="user-form">
                    <input type="hidden" id="user-id">

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">用户名</label>
                                <input type="text" class="form-control" id="user-username" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">邮箱</label>
                                <input type="email" class="form-control" id="user-email" required>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">密码</label>
                                <input type="password" class="form-control" id="user-password">
                                <div class="form-text">留空则不修改密码</div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <div class="form-check mt-4">
                                    <input type="checkbox" class="form-check-input" id="user-is-admin">
                                    <label class="form-check-label" for="user-is-admin">管理员（可访问所有Zabbix配置）</label>
                                </div>
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="user-is-active" checked>
                                    <label class="form-check-label" for="user-is-active">启用</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="zabbix-permissions-section">
                        <hr>
                        <h6><i class="bi bi-gear"></i> Zabbix配置权限</h6>
                        <p class="text-muted small">勾选允许该用户访问的Zabbix配置</p>
                        <div id="zabbix-permissions" class="border rounded p-2" style="max-height: 150px; overflow-y: auto;">
                            加载中...
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="save-user">保存</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
    let users = [];
    let zabbixConfigs = [];

    // 加载Zabbix配置列表
    async function loadZabbixConfigs() {
        const response = await fetch('/api/zabbix-config');
        zabbixConfigs = await response.json();
    }

    // 加载用户列表
    async function loadUsers() {
        const response = await fetch('/api/users');
        users = await response.json();

        const tbody = document.getElementById('user-table');
        tbody.innerHTML = users.map(u => {
            // 获取允许访问的Zabbix配置名称
            let zabbixNames = [];
            if (u.is_admin) {
                zabbixNames = ['全部'];
            } else if (u.allowed_zabbix_ids && u.allowed_zabbix_ids.length > 0) {
                zabbixNames = zabbixConfigs
                    .filter(z => u.allowed_zabbix_ids.includes(z.id))
                    .map(z => z.name);
            }

            return `
            <tr class="${!u.is_active ? 'table-warning' : ''}">
                <td>${u.id}</td>
                <td>
                    ${u.username}
                    ${!u.is_active ? '<span class="badge bg-warning text-dark ms-1">待启用</span>' : ''}
                </td>
                <td>${u.email}</td>
                <td>
                    ${u.is_admin
                        ? '<span class="badge bg-warning text-dark">管理员</span>'
                        : '<span class="badge bg-secondary">普通用户</span>'}
                </td>
                <td>
                    ${zabbixNames.length > 0
                        ? zabbixNames.map(n => `<span class="badge bg-info me-1">${n}</span>`).join('')
                        : '<span class="text-muted">无权限</span>'}
                </td>
                <td>
                    ${u.is_active
                        ? '<span class="badge bg-success">启用</span>'
                        : '<span class="badge bg-danger">禁用</span>'}
                </td>
                <td>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-primary edit-user" data-id="${u.id}"><i class="bi bi-pencil"></i> 编辑</button>
                        ${!u.is_active ? '<button class="btn btn-success activate-user" data-id="' + u.id + '"><i class="bi bi-check-circle"></i> 启用</button>' : ''}
                        <button class="btn btn-danger delete-user" data-id="${u.id}"><i class="bi bi-trash"></i> 删除</button>
                    </div>
                </td>
            </tr>
        `}).join('');

        // 绑定事件
        document.querySelectorAll('.edit-user').forEach(btn => {
            btn.addEventListener('click', () => editUser(parseInt(btn.dataset.id)));
        });
        document.querySelectorAll('.activate-user').forEach(btn => {
            btn.addEventListener('click', () => activateUser(parseInt(btn.dataset.id)));
        });
        document.querySelectorAll('.delete-user').forEach(btn => {
            btn.addEventListener('click', () => deleteUser(parseInt(btn.dataset.id)));
        });
    }

    // 渲染Zabbix权限选择
    function renderZabbixPermissions(allowedIds = []) {
        const container = document.getElementById('zabbix-permissions');
        if (zabbixConfigs.length === 0) {
            container.innerHTML = '<div class="text-muted">暂无Zabbix配置</div>';
            return;
        }

        container.innerHTML = zabbixConfigs.map(z => `
            <div class="form-check">
                <input class="form-check-input zabbix-permission-checkbox" type="checkbox" value="${z.id}" id="zabbix-${z.id}" ${allowedIds.includes(z.id) ? 'checked' : ''}>
                <label class="form-check-label" for="zabbix-${z.id}">${z.name}</label>
            </div>
        `).join('');
    }

    // 切换Zabbix权限区域显示
    function toggleZabbixPermissions() {
        const isAdmin = document.getElementById('user-is-admin').checked;
        const section = document.getElementById('zabbix-permissions-section');
        section.style.display = isAdmin ? 'none' : 'block';
    }

    // 监听管理员复选框变化
    document.getElementById('user-is-admin').addEventListener('change', toggleZabbixPermissions);

    // 打开新建模态框
    function openCreateModal() {
        document.getElementById('userModalTitle').textContent = '添加用户';
        document.getElementById('user-form').reset();
        document.getElementById('user-id').value = '';
        document.getElementById('user-is-active').checked = true;
        renderZabbixPermissions([]);
        toggleZabbixPermissions();
    }

    // 启用用户
    async function activateUser(userId) {
        try {
            const response = await fetch(`/api/users/${userId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ is_active: true })
            });

            if (response.ok) {
                loadUsers();
            } else {
                const result = await response.json();
                alert('启用失败: ' + result.detail);
            }
        } catch (error) {
            alert('启用失败: ' + error.message);
        }
    }

    // 编辑用户
    async function editUser(userId) {
        const user = users.find(u => u.id === userId);
        if (!user) return;

        document.getElementById('userModalTitle').textContent = '编辑用户';
        document.getElementById('user-id').value = user.id;
        document.getElementById('user-username').value = user.username;
        document.getElementById('user-email').value = user.email;
        document.getElementById('user-password').value = '';
        document.getElementById('user-is-admin').checked = user.is_admin;
        document.getElementById('user-is-active').checked = user.is_active;

        renderZabbixPermissions(user.allowed_zabbix_ids || []);
        toggleZabbixPermissions();

        new bootstrap.Modal(document.getElementById('userModal')).show();
    }

    // 保存用户
    document.getElementById('save-user').addEventListener('click', async function() {
        const userId = document.getElementById('user-id').value;
        const isAdmin = document.getElementById('user-is-admin').checked;

        const data = {
            email: document.getElementById('user-email').value,
            is_admin: isAdmin,
            is_active: document.getElementById('user-is-active').checked
        };

        const password = document.getElementById('user-password').value;
        if (password) {
            data.password = password;
        }

        // 获取选中的Zabbix配置
        if (!isAdmin) {
            const allowedIds = Array.from(document.querySelectorAll('.zabbix-permission-checkbox:checked'))
                .map(cb => parseInt(cb.value));
            data.allowed_zabbix_ids = allowedIds;
        }

        console.log('Saving user data:', JSON.stringify(data));

        const url = userId ? `/api/users/${userId}` : '/api/users';
        const method = userId ? 'PUT' : 'POST';

        try {
            const response = await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                const result = await response.json();
                console.log('Response:', result);
                bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
                loadUsers();
            } else {
                const result = await response.json();
                alert('保存失败: ' + result.detail);
            }
        } catch (error) {
            alert('保存失败: ' + error.message);
        }
    });

    // 删除用户
    async function deleteUser(userId) {
        if (!confirm('确定要删除此用户吗？')) return;

        try {
            await fetch(`/api/users/${userId}`, {
                method: 'DELETE'
            });
            loadUsers();
        } catch (error) {
            alert('删除失败: ' + error.message);
        }
    }

    // 模态框关闭时重置表单
    document.getElementById('userModal').addEventListener('hidden.bs.modal', function() {
        document.getElementById('user-form').reset();
        document.getElementById('user-id').value = '';
        document.getElementById('userModalTitle').textContent = '添加用户';
    });

    // 初始化
    loadZabbixConfigs().then(() => {
        loadUsers();
    });
</script>
{% endblock %}
