{% extends "base.html" %}

{% block title %}邮件配置 - Zabbix Report Center{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-envelope"></i> 邮件配置</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#configModal">
        <i class="bi bi-plus-circle"></i> 添加配置
    </button>
</div>

<!-- 配置列表 -->
<div class="card">
    <div class="card-body">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>名称</th>
                    <th>SMTP服务器</th>
                    <th>端口</th>
                    <th>发件人</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="config-table">
                <tr><td colspan="7" class="text-center text-muted">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 配置编辑模态框 -->
<div class="modal fade" id="configModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="configModalTitle">添加邮件配置</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="config-form">
                    <input type="hidden" id="config-id">

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">配置名称</label>
                                <input type="text" class="form-control" id="config-name" value="默认邮件配置">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">SSL加密</label>
                                <select class="form-select" id="config-use-ssl">
                                    <option value="true">是</option>
                                    <option value="false">否</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-8">
                            <div class="mb-3">
                                <label class="form-label">SMTP服务器</label>
                                <input type="text" class="form-control" id="config-smtp-server" required placeholder="smtp.example.com">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label class="form-label">端口</label>
                                <input type="number" class="form-control" id="config-smtp-port" required value="465">
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">SMTP用户名</label>
                                <input type="text" class="form-control" id="config-smtp-user" required placeholder="your@email.com">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">SMTP密码</label>
                                <input type="password" class="form-control" id="config-smtp-pass" placeholder="留空则不修改">
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">发件人地址</label>
                        <input type="email" class="form-control" id="config-mail-from" required placeholder="sender@email.com">
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="config-is-active" checked>
                        <label class="form-check-label" for="config-is-active">启用</label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-info" id="test-config">发送测试邮件</button>
                <button type="button" class="btn btn-primary" id="save-config">保存</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
    // 加载配置列表
    async function loadConfigs() {
        const response = await fetch('/api/email-config');
        const configs = await response.json();

        const tbody = document.getElementById('config-table');
        tbody.innerHTML = configs.map(c => `
            <tr>
                <td>${c.id}</td>
                <td>${c.name}</td>
                <td>${c.smtp_server}</td>
                <td>${c.smtp_port}</td>
                <td>${c.mail_from}</td>
                <td>
                    ${c.is_active
                        ? '<span class="badge bg-success">启用</span>'
                        : '<span class="badge bg-secondary">禁用</span>'}
                </td>
                <td>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-info test-conn" data-id="${c.id}" title="测试连接">
                            <i class="bi bi-plug"></i>
                        </button>
                        <button class="btn btn-primary edit-config" data-id="${c.id}">编辑</button>
                        <button class="btn btn-danger delete-config" data-id="${c.id}">删除</button>
                    </div>
                </td>
            </tr>
        `).join('');

        // 绑定事件
        document.querySelectorAll('.test-conn').forEach(btn => {
            btn.addEventListener('click', () => testConnection(parseInt(btn.dataset.id)));
        });
        document.querySelectorAll('.edit-config').forEach(btn => {
            btn.addEventListener('click', () => editConfig(parseInt(btn.dataset.id)));
        });
        document.querySelectorAll('.delete-config').forEach(btn => {
            btn.addEventListener('click', () => deleteConfig(parseInt(btn.dataset.id)));
        });
    }

    // 测试连接 - 发送测试邮件
    async function testConnection(configId) {
        // 获取收件人地址
        const toAddr = prompt('请输入接收测试邮件的邮箱地址（留空则发送给发件人自己）：');

        if (toAddr === null) {
            return; // 用户点击取消
        }

        try {
            const url = toAddr
                ? `/api/email-config/${configId}/test?to_addr=${encodeURIComponent(toAddr)}`
                : `/api/email-config/${configId}/test`;

            const response = await fetch(url);
            const result = await response.json();

            if (result.success) {
                alert(result.message || '测试邮件发送成功！');
            } else {
                alert(result.message || '发送失败: ' + result.error);
            }
        } catch (error) {
            alert('测试失败: ' + error.message);
        }
    }

    // 编辑配置
    async function editConfig(configId) {
        const response = await fetch(`/api/email-config/${configId}`);
        const config = await response.json();

        document.getElementById('config-id').value = config.id;
        document.getElementById('config-name').value = config.name;
        document.getElementById('config-smtp-server').value = config.smtp_server;
        document.getElementById('config-smtp-port').value = config.smtp_port;
        document.getElementById('config-smtp-user').value = config.smtp_user;
        document.getElementById('config-smtp-pass').value = '';
        document.getElementById('config-use-ssl').value = config.use_ssl.toString();
        document.getElementById('config-mail-from').value = config.mail_from;
        document.getElementById('config-is-active').checked = config.is_active;

        document.getElementById('configModalTitle').textContent = '编辑邮件配置';
        new bootstrap.Modal(document.getElementById('configModal')).show();
    }

    // 保存配置
    document.getElementById('save-config').addEventListener('click', async function() {
        const configId = document.getElementById('config-id').value;
        const name = document.getElementById('config-name').value.trim();
        const smtpServer = document.getElementById('config-smtp-server').value.trim();
        const smtpPort = document.getElementById('config-smtp-port').value;
        const smtpUser = document.getElementById('config-smtp-user').value.trim();
        const smtpPass = document.getElementById('config-smtp-pass').value;
        const mailFrom = document.getElementById('config-mail-from').value.trim();

        // 前端验证
        if (!name) {
            alert('请输入配置名称');
            return;
        }
        if (!smtpServer) {
            alert('请输入SMTP服务器地址');
            return;
        }
        if (!smtpPort || smtpPort < 1 || smtpPort > 65535) {
            alert('请输入有效的端口号（1-65535）');
            return;
        }
        if (!smtpUser) {
            alert('请输入SMTP用户名');
            return;
        }
        if (!configId && !smtpPass) {
            alert('请输入SMTP密码');
            return;
        }
        if (!mailFrom) {
            alert('请输入发件人地址');
            return;
        }
        if (!mailFrom.includes('@')) {
            alert('请输入有效的邮箱地址');
            return;
        }

        const data = {
            name: name,
            smtp_server: smtpServer,
            smtp_port: parseInt(smtpPort),
            smtp_user: smtpUser,
            use_ssl: document.getElementById('config-use-ssl').value === 'true',
            mail_from: mailFrom,
            is_active: document.getElementById('config-is-active').checked
        };

        if (smtpPass) {
            data.smtp_pass = smtpPass;
        }

        const url = configId ? `/api/email-config/${configId}` : '/api/email-config';
        const method = configId ? 'PUT' : 'POST';

        try {
            const response = await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                bootstrap.Modal.getInstance(document.getElementById('configModal')).hide();
                document.getElementById('config-form').reset();
                document.getElementById('config-id').value = '';
                document.getElementById('configModalTitle').textContent = '添加邮件配置';
                loadConfigs();
            } else {
                const result = await response.json();
                alert('保存失败: ' + result.detail);
            }
        } catch (error) {
            alert('保存失败: ' + error.message);
        }
    });

    // 删除配置
    async function deleteConfig(configId) {
        if (!confirm('确定要删除此配置吗？')) return;

        try {
            await fetch(`/api/email-config/${configId}`, {
                method: 'DELETE'
            });
            loadConfigs();
        } catch (error) {
            alert('删除失败: ' + error.message);
        }
    }

    // 模态框中的测试按钮
    document.getElementById('test-config').addEventListener('click', async function() {
        const configId = document.getElementById('config-id').value;

        if (!configId) {
            alert('请先保存配置后再发送测试邮件');
            return;
        }

        await testConnection(parseInt(configId));
    });

    // 模态框关闭时重置表单
    document.getElementById('configModal').addEventListener('hidden.bs.modal', function() {
        document.getElementById('config-form').reset();
        document.getElementById('config-id').value = '';
        document.getElementById('configModalTitle').textContent = '添加邮件配置';
    });

    // 初始化
    loadConfigs();
</script>
{% endblock %}
